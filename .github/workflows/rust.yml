name: Release Binaries

on:
  push:
    tags:
      - 'v*' # Triggers only when you push a version tag like v1.0.0

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: my-app-linux
          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            binary_name: my-app-windows.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: my-app-mac

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build with Cross
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--release"

      - name: Rename & Package
        shell: bash
        run: |
          # Moves the binary to a predictable name for the release
          cp target/${{ matrix.target }}/release/your_project_name ${{ matrix.binary_name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.binary_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
