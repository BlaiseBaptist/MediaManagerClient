name: Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: linux-latest
            target: x86_64-unknown-linux-gnu
            binary_name: MediaMangerClient-linux
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            binary_name: MediaMangerClient.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: MediaMangerClient-man

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build with Cross
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--release"

      - name: Rename & Package
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/MediaManagerClient ${{ matrix.binary_name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.binary_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
