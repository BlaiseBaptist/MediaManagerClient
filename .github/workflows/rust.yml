name: Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: linux-latest
            target: x86_64-unknown-linux-gnu
            binary_name: my-app-linux
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            binary_name: my-app-windows.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: my-app-mac

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Using the official cross-rs action to avoid deprecated v3 internal dependencies
      - name: Build with Cross
        uses: cross-rs/github-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--release"

      - name: Rename & Package
        shell: bash
        run: |
          # Replace 'your_project_name' with the name in your Cargo.toml
          cp target/${{ matrix.target }}/release/your_project_name ${{ matrix.binary_name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.binary_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
